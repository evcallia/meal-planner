name: Release

# Build and push the multiarch image when a version tag is pushed
# (git tag v2.0.0 && git push origin v2.0.0 — or creating a GitHub Release,
# which pushes the tag). The image tag mirrors the git tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Image
    # Secrets live in the "dockerhub" environment (Settings → Environments),
    # restricted to v* tags — unreachable from any other workflow or ref.
    environment: dockerhub

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          evcallia/meal-planner:${{ github.ref_name }}
          evcallia/meal-planner:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
