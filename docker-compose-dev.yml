# Dev/build variant: builds the image from source and tags it with the
# version that docker-compose.yml pulls. Typical flow:
#   docker compose -f docker-compose-dev.yml build   # produces meal-planner:<version>
#   docker compose -f docker-compose-dev.yml up -d   # run the freshly built image
services:
  db:
    image: postgres:16-alpine
    ports:
      # Loopback only — the app reaches the db over the internal network;
      # this mapping exists solely for local psql access from the host.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mealplanner}
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealplanner}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meal-planner-dev-backend

  app:
    build: .
    image: evcallia/meal-planner:${APP_VERSION:-2.0.0}
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Database
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mealplanner}
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Apple Calendar (CalDAV)
      APPLE_CALENDAR_EMAIL: ${APPLE_CALENDAR_EMAIL:-}
      APPLE_CALENDAR_APP_PASSWORD: ${APPLE_CALENDAR_APP_PASSWORD:-}
      APPLE_CALENDAR_NAMES: ${APPLE_CALENDAR_NAMES:-}
      # OIDC (Authentik)
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      # App
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      DEBUG_TIMING: ${DEBUG_TIMING:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - meal-planner-dev-backend

volumes:
  postgres_data:

networks:
  meal-planner-dev-backend:
    driver: bridge
