services:
  db:
    image: postgres:16-alpine
    ports:
      # Loopback only — the app reaches the db over the internal network;
      # this mapping exists solely for local psql access from the host.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mealplanner}
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealplanner}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meal-planner-dev-backend

  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Database
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mealplanner}
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Apple Calendar (CalDAV)
      APPLE_CALENDAR_EMAIL: ${APPLE_CALENDAR_EMAIL:-}
      APPLE_CALENDAR_APP_PASSWORD: ${APPLE_CALENDAR_APP_PASSWORD:-}
      APPLE_CALENDAR_NAMES: ${APPLE_CALENDAR_NAMES:-}
      # OIDC (Authentik)
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      # App
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      DEBUG_TIMING: ${DEBUG_TIMING:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - meal-planner-dev-backend   # reach the db sibling
      - proxy                       # Traefik can reach the app
      - external                    # outbound: OIDC discovery, Apple CalDAV
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meal-planner-dev.rule=Host(`meal-planner-dev.evancallia.com`)"
      - "traefik.http.routers.meal-planner-dev.entrypoints=websecure"
      - "traefik.http.routers.meal-planner-dev.middlewares=secure-chain@file"
      - "traefik.http.services.meal-planner-dev.loadbalancer.server.port=8000"
      - "traefik.http.routers.meal-planner-dev.tls=true"
      - "traefik.http.routers.meal-planner-dev.tls.certresolver=le-dns"

volumes:
  postgres_data:

networks:
  meal-planner-dev-backend:
    driver: bridge
  proxy:
    external: true
    name: proxy
  external:
    external: true
    name: external
